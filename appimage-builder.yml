version: 1

AppDir:
  path: ./AppDir
  app_info:
    id: dev.manel.gametracker
    name: GameTracker
    icon: gametracker
    version: 1.0.1
    exec: usr/bin/gametracker

  runtime:
    env:
      JAVA_HOME: "$APPDIR/usr/lib/jvm/java-21"

  apt:
    arch: amd64
    sources:
      - sourceline: 'deb http://archive.ubuntu.com/ubuntu jammy main restricted universe multiverse'
    include:
      - openjdk-21-jre
      - libfreetype6
      - libfontconfig1
      - libx11-6
      - libxext6
      - libxrender1
      - libxtst6
      - libxi6

AppImage:
  arch: x86_64
  update-information: gh-releases-zsync|Meliodas8|GameTracker|latest|GameTracker-x86_64.AppImage.zsync
  sign-key: None
  name: GameTracker-x86_64.AppImage
