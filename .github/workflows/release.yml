name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'corretto'

      - name: Grant execute permission to gradlew (Linux/Mac)
        if: runner.os != 'Windows'
        run: chmod +x gradlew

      - name: Build JAR
        run: ./gradlew jar

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: ./gradlew jpackageLinux

      - name: Package AppImage (Linux)
        if: runner.os == 'Linux'
        run: |
          # descarga appimagetool
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage

          # crea la estructura AppDir
          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/share/applications
          mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps

          # copia el JAR
          cp build/libs/GameTracker-1.0-SNAPSHOT.jar AppDir/usr/bin/

          # genera un icono placeholder con ImageMagick (ya instalado en los runners de GitHub)
          convert -size 256x256 xc:#4A90D9 \
            -font DejaVu-Sans-Bold -pointsize 72 \
            -fill white -gravity center -annotate 0 "GT" \
            AppDir/usr/share/icons/hicolor/256x256/apps/gametracker.png
          cp AppDir/usr/share/icons/hicolor/256x256/apps/gametracker.png AppDir/gametracker.png

          # crea el script de arranque
          cat > AppDir/usr/bin/gametracker << 'EOF'
          #!/bin/bash
          java -jar "$(dirname "$0")/GameTracker-1.0-SNAPSHOT.jar" "$@"
          EOF
          chmod +x AppDir/usr/bin/gametracker

          # crea el .desktop
          cat > AppDir/usr/share/applications/gametracker.desktop << 'EOF'
          [Desktop Entry]
          Name=GameTracker
          Exec=gametracker
          Icon=gametracker
          Type=Application
          Categories=Game;
          EOF
          cp AppDir/usr/share/applications/gametracker.desktop AppDir/gametracker.desktop

          # crea el AppRun
          cat > AppDir/AppRun << 'EOF'
          #!/bin/bash
          HERE="$(dirname "$(readlink -f "$0")")"
          export PATH="$HERE/usr/bin:$PATH"
          exec java -jar "$HERE/usr/bin/GameTracker-1.0-SNAPSHOT.jar" "$@"
          EOF
          chmod +x AppDir/AppRun

          # genera el AppImage
          ARCH=x86_64 ./appimagetool-x86_64.AppImage AppDir GameTracker-x86_64.AppImage

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: ./gradlew jpackageWindows

      - name: Package (Mac)
        if: runner.os == 'macOS'
        run: ./gradlew jpackageMac

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: GameTracker-${{ runner.os }}
          path: |
            build/dist/*
            GameTracker-x86_64.AppImage

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
