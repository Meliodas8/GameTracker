name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'corretto'

      - name: Grant execute permission to gradlew (Linux/Mac)
        if: runner.os != 'Windows'
        run: chmod +x gradlew

      - name: Build JAR
        run: ./gradlew jar

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: ./gradlew jpackageLinux
      
      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: ./gradlew jpackageWindows
      
      - name: Package (Mac)
        if: runner.os == 'macOS'
        run: ./gradlew jpackageMac

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: GameTracker-${{ runner.os }}
          path: build/dist/*

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
