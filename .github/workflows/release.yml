name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Show commit info
        run: git log -1 --oneline

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'corretto'

      - name: Grant execute permission to gradlew (Linux/Mac)
        if: runner.os != 'Windows'
        run: chmod +x gradlew

      - name: Set version
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=${VERSION}" > src/main/resources/dev/manel/gametracker/version.properties

      - name: Build JAR
        run: ./gradlew jar

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: ./gradlew jpackageLinux

      - name: Package AppImage (Linux)
        if: runner.os == 'Linux'
        run: |
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage
          ./appimagetool-x86_64.AppImage --appimage-extract
          mv squashfs-root appimagetool-squashfs

          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/share/applications
          mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps

          cp build/libs/GameTracker-1.0-SNAPSHOT.jar AppDir/usr/bin/

          pip3 install pillow -q
          python3 .github/scripts/generate_icon.py
          cp AppDir/usr/share/icons/hicolor/256x256/apps/gametracker.png AppDir/gametracker.png

          printf '#!/bin/bash\njava -jar "$(dirname "$0")/GameTracker-1.0-SNAPSHOT.jar" "$@"\n' > AppDir/usr/bin/gametracker
          chmod +x AppDir/usr/bin/gametracker

          printf '[Desktop Entry]\nName=GameTracker\nExec=gametracker\nIcon=gametracker\nType=Application\nCategories=Game;\n' > AppDir/usr/share/applications/gametracker.desktop
          cp AppDir/usr/share/applications/gametracker.desktop AppDir/gametracker.desktop

          printf '#!/bin/bash\nHERE="$(dirname "$(readlink -f "$0")")"\nexport PATH="$HERE/usr/bin:$PATH"\nexec java -jar "$HERE/usr/bin/GameTracker-1.0-SNAPSHOT.jar" "$@"\n' > AppDir/AppRun
          chmod +x AppDir/AppRun

          ARCH=x86_64 ./appimagetool-squashfs/AppRun AppDir GameTracker-x86_64.AppImage

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: ./gradlew jpackageWindows

      - name: Package (Mac)
        if: runner.os == 'macOS'
        run: ./gradlew jpackageMac

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: GameTracker-${{ runner.os }}
          path: |
            build/dist/*
            GameTracker-x86_64.AppImage

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*

  aur:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Calculate sha256
        id: sha256
        run: |
          wget -q "https://github.com/Meliodas8/GameTracker/releases/download/${GITHUB_REF_NAME}/GameTracker-x86_64.AppImage"
          echo "SHA256=$(sha256sum GameTracker-x86_64.AppImage | cut -d' ' -f1)" >> $GITHUB_OUTPUT

      - name: Update PKGBUILD
        run: |
          sed -i "s/^pkgver=.*/pkgver=${{ steps.version.outputs.VERSION }}/" PKGBUILD
          sed -i "s/^pkgrel=.*/pkgrel=1/" PKGBUILD
          sed -i "s/sha256sums=.*/sha256sums=('${{ steps.sha256.outputs.SHA256 }}')/" PKGBUILD

      - name: Deploy to AUR
        uses: KSXGitHub/github-actions-deploy-aur@v3.0.1
        with:
          pkgname: gametracker
          pkgbuild: ./PKGBUILD
          commit_username: Meliodas8
          commit_email: marticolelmolina@gmail.com
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: "Update to ${{ github.ref_name }}"